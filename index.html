<!DOCTYPE html>
<html>

<head>
<title>For KHUSHII ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
text-align:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;

display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#lockscreen{
padding:20px;
max-width:400px;
margin:auto;
}

#main{
display:none;
margin-top:50px;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:25px;
background:white;
color:#ff4d6d;
cursor:pointer;
margin-top:10px;
}

button:hover{
transform:scale(1.1);
}
.hearts {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.hearts span {
  position: absolute;
  bottom: -50px;
  font-size: 24px;
  animation: floatHearts 8s linear infinite;
}

.hearts span:nth-child(1){ left:10%; animation-duration:8s;}
.hearts span:nth-child(2){ left:20%; animation-duration:10s;}
.hearts span:nth-child(3){ left:30%; animation-duration:9s;}
.hearts span:nth-child(4){ left:40%; animation-duration:11s;}
.hearts span:nth-child(5){ left:50%; animation-duration:s;}
.hearts span:nth-child(6){ left:60%; animation-duration:8s;}
.hearts span:nth-child(7){ left:70%; animation-duration:10s;}
.hearts span:nth-child(8){ left:80%; animation-duration:9s;}
.hearts span:nth-child(9){ left:90%; animation-duration:11s;}
.hearts span:nth-child(10){ left:55%; animation-duration:9s;}

@keyframes floatHearts {
  0% {
    transform: translateY(0);
    opacity:1;
  }
  100% {
    transform: translateY(-100vh);
    opacity:0;
  }
}
/* Star container */

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

/* Individual stars */

.stars span{
position:absolute;
font-size:18px;
animation:sparkle 3s linear infinite;
}

/* Different star positions */

.stars span:nth-child(1){top:10%; left:15%;}
.stars span:nth-child(2){top:30%; left:70%;}
.stars span:nth-child(3){top:60%; left:25%;}
.stars span:nth-child(4){top:80%; left:50%;}
.stars span:nth-child(5){top:20%; left:90%;}
.stars span:nth-child(6){top:50%; left:10%;}
.stars span:nth-child(7){top:75%; left:80%;}
.stars span:nth-child(8){top:40%; left:40%;}

/* Sparkle animation */

@keyframes sparkle{

0%{
opacity:0;
transform:scale(0.5);
}

50%{
opacity:1;
transform:scale(1);
}

100%{
opacity:0;
transform:scale(0.5);
}

}
</style>

</head>

<body>
<div class="hearts">
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  
</div>
<div class="stars">
<span>✨</span>
<span>✨</span>
<span>✨</span>
<span>✨</span>
<span>✨</span>
</div>
<div id="lockscreen">

<h1>KHUSHII'S BIRTHDAY SURPRISE</h1>

<p>Enter the secret password to unlock</p>

<input type="password" id="password" placeholder="Enter password">

<br>

<button onclick="unlock()">Unlock Surprise ❤️</button>

<p id="wrong"></p>

</div>


<div id="main">

<h1>🎂 Happy Birthday KHUSHII ❤️</h1>

<p>
KHUSHII, you are the most special person in my life.
I cannot imagine my life without you.
Thank you for being part of my world.
</p>

<h2>From KHUSHIKASHUBH ❤️</h2>

</div>


<script>

function unlock(){

var pass = document.getElementById("password").value;

if(pass == "khushi"){

document.getElementById("lockscreen").style.display="none";

document.getElementById("main").style.display="block";

}

else{

document.getElementById("wrong").innerHTML="❌ Wrong password. Try again.";

}

}

</script>


</body>

</html>
