<!DOCTYPE html>
<html>

<head>
<title>For KHUSHII ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
text-align:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;

display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#lockscreen{
padding:20px;
max-width:400px;
margin:auto;
}

#main{
display:none;
margin-top:50px;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:25px;
background:white;
color:#ff4d6d;
cursor:pointer;
margin-top:10px;
}

button:hover{
transform:scale(1.1);
}
.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.hearts span{
position:absolute;
font-size:30px;
animation:float 6s linear infinite;
bottom:-50px;
}

.hearts span:nth-child(1){ left:10%; animation-duration:7s;}
.hearts span:nth-child(2){ left:30%; animation-duration:5s;}
.hearts span:nth-child(3){ left:50%; animation-duration:6s;}
.hearts span:nth-child(4){ left:70%; animation-duration:8s;}
.hearts span:nth-child(5){ left:90%; animation-duration:7s;}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}
</style>

</head>

<body>
<div class="hearts">
❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️
</div
<div id="lockscreen">

<h1>KHUSHII'S BIRTHDAY SURPRISE</h1>

<p>Enter the secret password to unlock</p>

<input type="password" id="password" placeholder="Enter password">

<br>

<button onclick="unlock()">Unlock Surprise ❤️</button>

<p id="wrong"></p>

</div>


<div id="main">

<h1>🎂 Happy Birthday KHUSHII ❤️</h1>

<p>
KHUSHII, you are the most special person in my life.
I cannot imagine my life without you.
Thank you for being part of my world.
</p>

<h2>From KHUSHIKASHUBH ❤️</h2>

</div>


<script>

function unlock(){

var pass = document.getElementById("password").value;

if(pass == "khushi"){

document.getElementById("lockscreen").style.display="none";

document.getElementById("main").style.display="block";

}

else{

document.getElementById("wrong").innerHTML="❌ Wrong password. Try again.";

}

}

</script>
<div class="floating-hearts"></div>

<style>
.floating-hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background-image:
url("https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Heart_corazón.svg/32px-Heart_corazón.svg.png");
background-repeat:repeat;
animation:heartsMove 15s linear infinite;
opacity:0.4;
}

@keyframes heartsMove{
0%{background-position:0 100vh;}
100%{background-position:0 -100vh;}
}
</style>
</body>

</html>
