<!DOCTYPE html>
<html>

<head>
<title>For KHUSHII ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
text-align:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;

display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#lockscreen{
padding:20px;
max-width:400px;
margin:auto;
}

#main{
display:none;
margin-top:50px;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:25px;
background:white;
color:#ff4d6d;
cursor:pointer;
margin-top:10px;
}

button:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<div id="lockscreen">

<h1>KHUSHII'S BIRTHDAY SURPRISE</h1>

<p>Enter the secret password to unlock</p>

<input type="password" id="password" placeholder="Enter password">

<br>

<button onclick="unlock()">Unlock Surprise ❤️</button>

<p id="wrong"></p>

</div>


<div id="main">

<h1>🎂 Happy Birthday KHUSHII ❤️</h1>

<p>
KHUSHII, you are the most special person in my life.
I cannot imagine my life without you.
Thank you for being part of my world.
</p>

<h2>From KHUSHIKASHUBH ❤️</h2>

</div>


<script>

function unlock(){

var pass = document.getElementById("password").value;

if(pass == "khushi"){

document.getElementById("lockscreen").style.display="none";

document.getElementById("main").style.display="block";

}

else{

document.getElementById("wrong").innerHTML="❌ Wrong password. Try again.";

}

}

</script>


</body>

</html>
